name: CI

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      extension:
        description: "Extension to build e.g. all.pornhub — leave blank for ALL"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & publish APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. Checkout master ────────────────────────────────────────────────
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          path: master
          fetch-depth: 0

      # ── 2. Checkout (or create) repo branch ──────────────────────────────
      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          ref: repo
          path: repo
          fetch-depth: 0
        continue-on-error: true

      - name: Create repo branch if missing
        run: |
          if [ ! -d repo/.git ]; then
            echo "repo branch missing — creating it"
            mkdir -p repo && cd repo
            git init
            git remote add origin \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
            git checkout --orphan repo
            echo "# APK repo branch" > README.md
            echo "apk/" >> .gitignore
            git add .
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Init repo branch"
            git push origin repo
          fi

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      # ── 4. Gradle ─────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Write gradle.properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          kotlin.incremental=false
          EOF

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build specific extension
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.extension != '' }}
        working-directory: master
        run: |
          # jmir1-style module path: :src:<lang>.<name>
          EXT="${{ github.event.inputs.extension }}"
          # Convert dot notation to colon  all.pornhub → :src:all.pornhub
          ./gradlew ":src:${EXT}:assembleDebug"
        env:
          CI_PUSH: "true"

      - name: Build all extensions
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.extension == '' }}
        working-directory: master
        run: ./gradlew assembleDebug
        env:
          CI_PUSH: "true"

      # ── 6. Collect APKs + generate index ─────────────────────────────────
      - name: Collect APKs and generate index.min.json
        run: |
          set -e
          COLLECT="master/apk-out"
          mkdir -p "$COLLECT"

          # Gather all debug APKs produced by the build
          find master -name "*.apk" \
            \( -path "*/debug/*" -o -path "*/outputs/apk/*" \) \
            -not -path "*/intermediates/*" \
            -not -path "*/test/*" \
            | while read f; do
                cp -n "$f" "$COLLECT/"
                echo "  collected: $(basename $f)"
              done

          COUNT=$(ls "$COLLECT/"*.apk 2>/dev/null | wc -l)
          echo "Total APKs collected: $COUNT"
          ls -lh "$COLLECT/" || true

          # Locate aapt2 from the Android SDK bundled on the runner
          AAPT2=$(find "$ANDROID_HOME/build-tools" -name "aapt2" | sort -rV | head -1)
          echo "aapt2: $AAPT2"

          # Generate index.min.json
          python3 - "$COLLECT" "$AAPT2" <<'PYEOF'
          import sys, os, json, subprocess, re

          apk_dir = sys.argv[1]
          aapt2   = sys.argv[2]
          entries = []

          for fname in sorted(os.listdir(apk_dir)):
              if not fname.endswith(".apk"):
                  continue
              path = os.path.join(apk_dir, fname)
              try:
                  out = subprocess.run(
                      [aapt2, "dump", "badging", path],
                      capture_output=True, text=True, timeout=30
                  ).stdout
              except Exception as e:
                  print(f"  SKIP {fname}: {e}")
                  continue

              def g(pat, s, d=""):
                  m = re.search(pat, s)
                  return m.group(1) if m else d

              pkg     = g(r"package: name='([^']+)'", out)
              code    = g(r"versionCode='([^']+)'", out)
              ver     = g(r"versionName='([^']+)'", out)
              label   = g(r"application-label:'([^']+)'", out)
              lang    = g(r"tachiyomi\.animeextension\.lang:value='([^']+)'", out, "all")
              nsfw    = int(g(r"tachiyomi\.animeextension\.nsfw:value='([^']+)'", out, "0"))

              if not pkg:
                  print(f"  SKIP {fname}: no package name")
                  continue

              entries.append({
                  "name":    label or pkg.split(".")[-1],
                  "pkg":     pkg,
                  "apk":     fname,
                  "lang":    lang,
                  "code":    int(code) if code.isdigit() else 1,
                  "version": ver or "1.0",
                  "nsfw":    nsfw,
                  "sources": [{
                      "name":      label or pkg.split(".")[-1],
                      "lang":      lang,
                      "id":        str(abs(hash(pkg)) % (10**18)),
                      "baseUrl":   "",
                      "versionId": 1,
                  }],
              })
              print(f"  + {fname}  ({pkg}  v{ver})")

          idx = os.path.join(apk_dir, "index.min.json")
          with open(idx, "w") as f:
              json.dump(entries, f, separators=(",",":"))
          print(f"\nindex.min.json → {len(entries)} extension(s)")
          PYEOF

      # ── 7. Push to repo branch ────────────────────────────────────────────
      - name: Deploy to repo branch
        run: |
          set -e
          SRC="master/apk-out"
          DEST="repo"

          mkdir -p "$DEST/apk"
          cp "$SRC/"*.apk      "$DEST/apk/" 2>/dev/null || true
          cp "$SRC/index.min.json" "$DEST/"

          cd "$DEST"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

          git add .

          if git diff --cached --quiet; then
            echo "No changes — repo branch already up to date."
          else
            TRIGGER="${{ github.event_name }}"
            EXT="${{ github.event.inputs.extension }}"
            if [ "$TRIGGER" = "workflow_dispatch" ] && [ -n "$EXT" ]; then
              MSG="Build: $EXT"
            else
              MSG="Update all extensions"
            fi
            git commit -m "$MSG ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push origin repo
            echo "✅ Pushed to repo branch."
          fi
          
