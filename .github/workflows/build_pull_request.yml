name: PR Build Check

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build changed extensions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write gradle.properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          kotlin.incremental=false
          EOF

      - name: Detect changed extensions
        id: changed
        run: |
          # jmir1 module names live at src/<lang>.<name>/
          MODS=$(git diff --name-only origin/master...HEAD \
            | grep '^src/' \
            | awk -F'/' '{print $2}' \
            | sort -u \
            | tr '\n' ' ')
          echo "modules=$MODS" >> $GITHUB_OUTPUT
          echo "Changed modules: $MODS"

      - name: Build changed extensions
        if: ${{ steps.changed.outputs.modules != '' }}
        run: |
          for MOD in ${{ steps.changed.outputs.modules }}; do
            echo "::group::Building $MOD"
            ./gradlew ":src:${MOD}:assembleDebug"
            echo "::endgroup::"
          done

      - name: Nothing changed
        if: ${{ steps.changed.outputs.modules == '' }}
        run: echo "No extension files changed — nothing to build."
        
